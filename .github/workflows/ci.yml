name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Backend lint + import check ───────────────────────────────────────────
  backend:
    name: Backend
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Lint with ruff
        working-directory: backend
        run: ruff check app/ --ignore E501,F401

      - name: Check imports resolve
        working-directory: backend
        env:
          DATABASE_URL: "postgresql+asyncpg://postgres:test@localhost/test"
          REDIS_URL: "redis://localhost:6379/0"
          SECRET_KEY: "ci-test-secret-key-not-real-64chars-padding-here"
          VIRUSTOTAL_API_KEY: "ci-placeholder"
          ABUSEIPDB_API_KEY: "ci-placeholder"
          OTX_API_KEY: "ci-placeholder"
          GROQ_API_KEY: "ci-placeholder"
          MODELS_DIR: "/tmp/models"
        run: python -c "from app.main import app; print('✅ Imports OK')"

  # ── Frontend build check ──────────────────────────────────────────────────
  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        env:
          VITE_API_URL: "https://placeholder.railway.app"
        run: npm run build

      - name: Check build output exists
        run: |
          test -d frontend/dist && echo "✅ Build output exists" || exit 1

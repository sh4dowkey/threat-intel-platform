version: "3.9"

services:

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ../backend/.env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - MODELS_DIR=/app/models
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      # Hot reload in development — remove in production
      - ../backend/app:/app/app
    restart: unless-stopped

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    env_file:
      - ../backend/.env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - MODELS_DIR=/app/models
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A app.tasks.enrich worker --loglevel=info
    restart: unless-stopped

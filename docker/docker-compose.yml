services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  backend:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ../backend/.env
    depends_on:
      - redis
    volumes:
      - ../backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --reload

  worker:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile
    env_file:
      - ../backend/.env
    depends_on:
      - redis
    command: celery -A app.tasks.enrich worker --loglevel=info